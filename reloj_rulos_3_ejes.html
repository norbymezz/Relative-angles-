<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🌀 Reloj de Rulos - 3 Ejes</title>
  <style>
    body { background:#111; color:#fff; font-family:sans-serif; text-align:center; }
    canvas { background:#000; display:block; margin:0 auto; border:1px solid #444; }
    .controls { margin-top:10px; display:flex; justify-content:center; flex-wrap:wrap; gap:10px; }
    label { color:#ddd; font-size:14px; }
    input, select, button { font-size:14px; }
    #hud { margin-top:8px; font-size:13px; color:#ccc; }
  </style>
</head>
<body>
  <h2>🌀 Reloj de Rulos: 3 ejes girando (anidado)</h2>
  <canvas id="cv" width="700" height="700"></canvas>

  <div class="controls">
    <label>ω1 <input type="number" id="w1" value="0.05" step="0.01"></label>
    <label>ω2 <input type="number" id="w2" value="0.09" step="0.01"></label>
    <label>ω3 <input type="number" id="w3" value="0.13" step="0.01"></label>
    <label>r1 <input type="number" id="r1" value="140" step="1"></label>
    <label>r2 <input type="number" id="r2" value="90" step="1"></label>
    <label>r3 <input type="number" id="r3" value="55" step="1"></label>
    <label>Color
      <select id="colorMode">
        <option value="w1">ciclo ω1</option>
        <option value="w2">ciclo ω2</option>
        <option value="w3">ciclo ω3</option>
        <option value="mix" selected>mix (ω1+ω2+ω3)</option>
        <option value="rel">ángulo relativo (θ1-θ2-θ3)</option>
      </select>
    </label>
    <button id="reset">🔁 Reset</button>
    <button id="pause">⏯️ Pausar</button>
  </div>

  <div id="hud"></div>

  <script>
    const cv = document.getElementById('cv');
    const ctx = cv.getContext('2d');

    const w1El = document.getElementById('w1');
    const w2El = document.getElementById('w2');
    const w3El = document.getElementById('w3');
    const r1El = document.getElementById('r1');
    const r2El = document.getElementById('r2');
    const r3El = document.getElementById('r3');
    const modeEl = document.getElementById('colorMode');
    const resetEl = document.getElementById('reset');
    const pauseEl = document.getElementById('pause');
    const hudEl = document.getElementById('hud');

    let t = 0;
    let paused = false;
    let trace = [];

    resetEl.addEventListener('click', () => { t = 0; trace = []; });
    pauseEl.addEventListener('click', () => { paused = !paused; });

    function normAngle(a) {
      a = a % (2*Math.PI);
      if (a < 0) a += 2*Math.PI;
      return a;
    }

    function hsvToRgb(h, s, v) {
      const i = Math.floor(h * 6);
      const f = h * 6 - i;
      const p = v * (1 - s);
      const q = v * (1 - f * s);
      const u = v * (1 - (1 - f) * s);
      let r, g, b;
      switch (i % 6) {
        case 0: r=v; g=u; b=p; break;
        case 1: r=q; g=v; b=p; break;
        case 2: r=p; g=v; b=u; break;
        case 3: r=p; g=q; b=v; break;
        case 4: r=u; g=p; b=v; break;
        case 5: r=v; g=p; b=q; break;
      }
      return `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
    }

    function hueFrom(mode, a1, a2, a3, w1, w2, w3) {
      if (mode === 'w1') return normAngle(a1) / (2*Math.PI);
      if (mode === 'w2') return normAngle(a2) / (2*Math.PI);
      if (mode === 'w3') return normAngle(a3) / (2*Math.PI);
      if (mode === 'rel') return normAngle(a1 - a2 - a3) / (2*Math.PI);
      const mix = normAngle(w1*a1 + w2*a2 + w3*a3);
      return mix / (2*Math.PI);
    }

    function step() {
      const w1 = parseFloat(w1El.value);
      const w2 = parseFloat(w2El.value);
      const w3 = parseFloat(w3El.value);
      const r1 = parseFloat(r1El.value);
      const r2 = parseFloat(r2El.value);
      const r3 = parseFloat(r3El.value);
      const mode = modeEl.value;

      if (!paused) t += 0.05;

      const cx = cv.width / 2;
      const cy = cv.height / 2;

      const a1 = w1 * t;
      const a2 = w2 * t;
      const a3 = w3 * t;

      const x1 = cx + r1 * Math.cos(a1);
      const y1 = cy + r1 * Math.sin(a1);

      const x2 = x1 + r2 * Math.cos(a2);
      const y2 = y1 + r2 * Math.sin(a2);

      const x3 = x2 + r3 * Math.cos(a3);
      const y3 = y2 + r3 * Math.sin(a3);

      if (!paused) {
        trace.push({x:x3, y:y3, a1:a1, a2:a2, a3:a3, t:t, w1:w1, w2:w2, w3:w3});
        if (trace.length > 3000) trace.shift();
      }

      ctx.clearRect(0,0,cv.width,cv.height);

      // trace (colored per-point)
      ctx.lineWidth = 1.2;
      for (let i=1; i<trace.length; i++) {
        const p0 = trace[i-1];
        const p1 = trace[i];
        const h = hueFrom(mode, p1.a1, p1.a2, p1.a3, p1.w1, p1.w2, p1.w3);
        ctx.strokeStyle = hsvToRgb(h, 1, 1);
        ctx.beginPath();
        ctx.moveTo(p0.x, p0.y);
        ctx.lineTo(p1.x, p1.y);
        ctx.stroke();
      }

      // arms
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.lineTo(x3, y3);
      ctx.stroke();

      // joints
      ctx.fillStyle = 'red';
      const pts = [[cx,cy],[x1,y1],[x2,y2],[x3,y3]];
      for (const [x,y] of pts) { ctx.beginPath(); ctx.arc(x,y,4,0,2*Math.PI); ctx.fill(); }

      const rel12 = (normAngle(a1-a2) * 180/Math.PI).toFixed(1);
      const rel23 = (normAngle(a2-a3) * 180/Math.PI).toFixed(1);
      const rel123 = (normAngle(a1-a2-a3) * 180/Math.PI).toFixed(1);
      const ratio12 = (w2 !== 0 ? (w1/w2).toFixed(4) : '∞');
      const ratio23 = (w3 !== 0 ? (w2/w3).toFixed(4) : '∞');

      hudEl.textContent =
        `θ1=${(normAngle(a1)*180/Math.PI).toFixed(1)}°  θ2=${(normAngle(a2)*180/Math.PI).toFixed(1)}°  θ3=${(normAngle(a3)*180/Math.PI).toFixed(1)}°  |  ` +
        `Δ12=${rel12}°  Δ23=${rel23}°  Δ1-2-3=${rel123}°  |  ω1/ω2=${ratio12}  ω2/ω3=${ratio23}`;

      requestAnimationFrame(step);
    }

    step();
  </script>
</body>
</html>
